services:
  postgres:
    image: "postgres:17"
    container_name: comments-db
    ports:
      # Host 5434 -> container 5432 (5432 do host está ocupado pelo nasa-db)
      - "5434:5432"
    environment:
      POSTGRES_USER: docker
      POSTGRES_PASSWORD: docker
      POSTGRES_DB: comments_db
    volumes:
      # Dados do banco persistem entre restarts/rebuilds
      - comments_pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docker -d comments_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  comments_pgdata:
